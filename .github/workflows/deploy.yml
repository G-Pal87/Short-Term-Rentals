name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [rates-updated]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Restore calendar cache from gh-pages
        run: |
          git fetch origin gh-pages
          mkdir -p public/calendars
          for id in venus-beach-retreat luxe-poolside-escape poolside-central-studio colorful-2bedroom-house beach-house-studio; do
            git show origin/gh-pages:calendars/${id}.json > public/calendars/${id}.json 2>/dev/null && \
              echo "Restored $id" || echo "No cache for $id"
          done

      - name: Build static site
        env:
          AIRBNB_ICAL_VENUS_BEACH_RETREAT: ${{ secrets.AIRBNB_ICAL_VENUS_BEACH_RETREAT }}
          AIRBNB_ICAL_LUXE_POOLSIDE_ESCAPE: ${{ secrets.AIRBNB_ICAL_LUXE_POOLSIDE_ESCAPE }}
          AIRBNB_ICAL_POOLSIDE_CENTRAL_STUDIO: ${{ secrets.AIRBNB_ICAL_POOLSIDE_CENTRAL_STUDIO }}
          AIRBNB_ICAL_COLORFUL_2BEDROOM_HOUSE: ${{ secrets.AIRBNB_ICAL_COLORFUL_2BEDROOM_HOUSE }}
          AIRBNB_ICAL_BEACH_HOUSE_STUDIO: ${{ secrets.AIRBNB_ICAL_BEACH_HOUSE_STUDIO }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          keep_files: true
          cname: ""

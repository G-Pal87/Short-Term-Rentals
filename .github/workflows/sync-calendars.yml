name: Sync Airbnb Calendars

on:
  schedule:
    # Run every hour to keep blocked dates fresh
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Fetch and parse iCal feeds
        run: |
          mkdir -p calendars

          fetch_ical() {
            local id="$1"
            local url="$2"
            echo "Fetching $id..."
            local ical
            ical=$(curl -sf --max-time 20 \
              -A "Mozilla/5.0 (compatible; calendar-sync/1.0)" \
              "$url") || { echo "WARN: failed to fetch $id"; echo '{"updatedAt":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'","blocked":[]}' > "calendars/${id}.json"; return; }

            # Parse VEVENT blocks into JSON array of {start, end}
            python3 - "$id" "$ical" <<'PYEOF'
import sys, re, json
from datetime import datetime, timezone

prop_id = sys.argv[1]
text = sys.argv[2]

def to_date(raw):
    raw = re.sub(r'^[^:]*:', '', raw).strip()
    m = re.match(r'^(\d{4})(\d{2})(\d{2})', raw)
    return f"{m.group(1)}-{m.group(2)}-{m.group(3)}" if m else None

blocked = []
for ev in text.split('BEGIN:VEVENT')[1:]:
    sm = re.search(r'DTSTART[;:][^\r\n]+', ev)
    em = re.search(r'DTEND[;:][^\r\n]+', ev)
    if not sm:
        continue
    start = to_date(sm.group(0))
    end = to_date(em.group(0)) if em else start
    if start and end:
        blocked.append({'start': start, 'end': end})

out = {'updatedAt': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'), 'blocked': blocked}
with open(f'calendars/{prop_id}.json', 'w') as f:
    json.dump(out, f)
print(f"  {prop_id}: {len(blocked)} blocked ranges")
PYEOF
          }

          fetch_ical "venus-beach-retreat"      "https://www.airbnb.gr/calendar/ical/1341854905555812998.ics?t=1e2c75c8b84645a4ac88669d8ec7bdda"
          fetch_ical "luxe-poolside-escape"     "https://www.airbnb.gr/calendar/ical/1389855941514317769.ics?t=a2520714c5a34b1daa3b808b6c1bfd0e"
          fetch_ical "poolside-central-studio"  "https://www.airbnb.gr/calendar/ical/1417130109923067210.ics?t=e8ec8f5e94b845b6817598eeaa30df0e"
          fetch_ical "colorful-2bedroom-house"  "https://www.airbnb.com/calendar/ical/720194839435246794.ics?t=3da4aac00c9d4eb6bbe7f3496aa22ee8"
          fetch_ical "beach-house-studio"       "https://www.airbnb.com/calendar/ical/888793861213418554.ics?t=130346559a814283901a9b2280797a38"

      - name: Commit calendar JSON to gh-pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calendars/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "sync: update calendar blocked dates $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin gh-pages
          fi

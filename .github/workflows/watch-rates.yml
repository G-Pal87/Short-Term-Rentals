name: Watch for Rate Updates

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if Business-Tracking rates have changed
        id: check
        run: |
          FEED_URL="https://raw.githubusercontent.com/G-Pal87/Business-Tracking/main/exports/daily-rates/prop_mox7ipfiam.json"
          STAMP_FILE=".last-rates-update"

          # Fetch the latest generatedAt from the feed
          LATEST=$(curl -sf "$FEED_URL" | python3 -c "import json,sys; print(json.load(sys.stdin).get('generatedAt',''))" 2>/dev/null || echo "")

          if [ -z "$LATEST" ]; then
            echo "Could not fetch feed — skipping"
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Compare with stored timestamp
          STORED=""
          if [ -f "$STAMP_FILE" ]; then
            STORED=$(cat "$STAMP_FILE")
          fi

          if [ "$LATEST" = "$STORED" ]; then
            echo "Rates unchanged ($LATEST) — no rebuild needed"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Rates changed: $STORED → $LATEST"
            echo "$LATEST" > "$STAMP_FILE"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit timestamp and trigger deploy
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-rates-update
          git commit -m "chore: rates updated in Business-Tracking — rebuild site"
          git pull --rebase origin main
          git push origin main
